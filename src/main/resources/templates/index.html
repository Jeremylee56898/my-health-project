<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的健康日誌</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { display: flex; gap: 20px; }
        .form-box, .chart-box { background: white; padding: 20px; border-radius: 8px; }
        .form-box { width: 300px; }
        .chart-box { flex-grow: 1; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background-color: #4f46e5; color: white; border: none; }
    </style>
</head>
<body>

    <h1>智慧健康日誌與風險評估</h1>

    <div class="container">
        <div class="form-box">
            <h3>新增今日數據</h3>
            <form action="/add" method="post">
                <input type="date" name="date" required>
                <input type="number" name="sleep" placeholder="睡眠時數 (小時)" required>
                <input type="number" name="steps" placeholder="累積步數" required>
                <input type="number" name="mood" placeholder="心情分數 (1-10)" required>
                <button type="submit">送出並分析風險</button>
            </form>
        </div>

        <div class="chart-box">
            <div class="table-box" style="margin-top: 20px;">
    <h3>健康紀錄列表</h3>
    <table border="1" width="100%">
        <thead>
            <tr>
                <th>日期</th>
                <th>睡眠時數</th>
                <th>步數</th>
                <th>心情分數</th>
            </tr>
        </thead>
        <tbody id="logTableBody">
            </tbody>
    </table>
</div>
            <h3>睡眠與步數統計</h3>
            <canvas id="myChart" width="400" height="200"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        fetch('/api/data')
            .then(response => response.json())
            .then(data => {
                // 1. 獨立處理圖表
                try {
                    const ctx = document.getElementById('myChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: data.map(item => item.RECORD_DATE || item.record_date),
                            datasets: [{
                                label: '每日睡眠時數',
                                data: data.map(item => item.SLEEP_HOURS || item.sleep_hours),
                                borderColor: '#4f46e5',
                                fill: true
                            }]
                        }
                    });
                } catch (e) { console.error("圖表繪製失敗:", e); }

                // 2. 獨立處理表格
                try {
                    const tableBody = document.getElementById('logTableBody');
                    tableBody.innerHTML = ''; 
                    data.forEach(item => {
                        tableBody.innerHTML += `<tr>
                            <td>${item.RECORD_DATE || item.record_date}</td>
<td>${item.SLEEP_HOURS || item.sleep_hours}</td>
<td>${item.STEPS || item.steps || 0}</td>
<td>${item.MOOD_SCORE || item.mood_score || 0}</td>
                        </tr>`;
                    });
                } catch (e) { console.error("表格生成失敗:", e); }
            });
    });
</script>
</body>
</html>
